<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia Selvia — Contabilidade, IR e Reforma Tributária para Médicos</title>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ve:#0D423F;--vc:#69E470;--ow:#F9F9F9;--ac:#F1FDC1;--bg:#E2E7C7;--lr:#F4933B;--az:#84A0FF;--am:#FFD15C;--rs:#F2B8F4}
body{font-family:'Lexend',sans-serif;background:#eaeae6;min-height:100vh;display:flex;flex-direction:column}
nav{background:var(--ve);padding:12px 24px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.nav-logo{color:#fff;font-weight:700;font-size:20px;cursor:pointer;letter-spacing:-0.5px}
.nav-links{display:flex;gap:6px;flex-wrap:wrap;justify-content:flex-end}
.nav-btn{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);border:none;padding:6px 14px;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;transition:all 0.2s}
.nav-btn.active{background:var(--vc);color:var(--ve);font-weight:600}
.nav-btn:hover{background:rgba(255,255,255,0.15)}
.nav-btn.active:hover{background:var(--vc)}
.breadcrumb{padding:10px 24px;font-size:12px;color:#888;background:#f4f4f0;border-bottom:1px solid var(--bg);display:none}
.breadcrumb.show{display:block}
.breadcrumb span.link{cursor:pointer;color:var(--ve)}
.breadcrumb span.current{color:#555;font-weight:500}
main{flex:1;max-width:720px;width:100%;margin:0 auto;padding:24px 20px 60px}
footer{background:var(--bg);padding:20px 24px;text-align:center}
.footer-logo{font-weight:700;color:var(--ve);font-size:15px;margin-bottom:4px}
.footer-tag{color:#6b7a5e;font-size:11px}

/* Page sections */
.page{display:none}
.page.active{display:block}

/* Home hero */
.hero{background:var(--ve);border-radius:20px;padding:48px 40px;margin-bottom:32px;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;top:-40px;right:-40px;width:200px;height:200px;background:var(--vc);border-radius:50%;opacity:0.07}
.hero::before{content:'';position:absolute;bottom:-30px;left:-30px;width:140px;height:140px;background:var(--ac);border-radius:50%;opacity:0.05}
.hero-label{font-size:14px;color:var(--vc);font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:16px;position:relative;z-index:1}
.hero h1{font-size:28px;font-weight:700;color:#fff;margin-bottom:12px;line-height:1.3;max-width:500px;position:relative;z-index:1}
.hero p{color:rgba(255,255,255,0.65);font-size:15px;line-height:1.7;max-width:460px;position:relative;z-index:1}

/* Cards grid */
.cards-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
.nav-card{background:#fff;border:1px solid var(--bg);border-radius:14px;padding:24px 20px;cursor:pointer;transition:all 0.2s}
.nav-card:hover{border-color:var(--vc);transform:translateY(-2px);box-shadow:0 8px 24px rgba(13,66,63,0.08)}
.nav-card .num{font-size:11px;font-weight:700;color:var(--vc);letter-spacing:1.5px;margin-bottom:10px}
.nav-card .title{font-weight:600;color:var(--ve);font-size:16px;margin-bottom:6px}
.nav-card .desc{color:#888;font-size:12px}
.partner-bar{background:var(--ac);border-radius:14px;padding:20px 24px;text-align:center;font-size:13px;color:var(--ve);font-weight:500}

/* Section header */
.sec-badge{display:inline-block;background:var(--vc);color:var(--ve);font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px;margin-bottom:12px}
.sec-title{font-size:26px;font-weight:700;color:var(--ve);margin-bottom:8px;line-height:1.3}
.sec-sub{color:#666;font-size:15px;line-height:1.7;margin-bottom:32px}

/* Topic cards */
.topic{background:#fff;border-radius:12px;border:1px solid var(--bg);margin-bottom:12px;overflow:hidden;cursor:pointer;transition:box-shadow 0.2s}
.topic:hover{box-shadow:0 4px 16px rgba(13,66,63,0.08)}
.topic-header{padding:18px 20px;display:flex;justify-content:space-between;align-items:center}
.topic-header span{font-weight:600;color:var(--ve);font-size:15px}
.topic-arrow{font-size:18px;color:var(--vc);transition:transform 0.3s}
.topic.open .topic-arrow{transform:rotate(180deg)}
.topic-body{display:none;padding:0 20px 18px;border-top:1px solid var(--bg)}
.topic.open .topic-body{display:block}
.topic-item{padding:10px 0;border-bottom:1px solid #f0f0f0}
.topic-item:last-child{border-bottom:none}
.topic-item strong{font-weight:600;color:var(--ve);font-size:14px;display:block;margin-bottom:4px}
.topic-item p{color:#555;font-size:13px;line-height:1.7;margin:0}
.topic[data-accent="green"]{border-left:4px solid var(--vc)}
.topic[data-accent="yellow"]{border-left:4px solid var(--am)}
.topic[data-accent="blue"]{border-left:4px solid var(--az)}
.topic[data-accent="orange"]{border-left:4px solid var(--lr)}
.topic[data-accent="pink"]{border-left:4px solid var(--rs)}
.topic[data-accent="red"]{border-left:4px solid #E24B4A}

/* Download card */
.dl-card{background:var(--ac);border-radius:10px;padding:16px 20px;display:flex;justify-content:space-between;align-items:center;margin-top:16px}
.dl-card .info strong{font-weight:600;color:var(--ve);font-size:14px;display:block}
.dl-card .info span{color:#666;font-size:12px}
.dl-card .btn{background:var(--ve);color:#fff;padding:8px 16px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap}

/* Alert box */
.alert-box{background:var(--ve);border-radius:14px;padding:24px;margin-bottom:20px;display:flex;align-items:center;gap:16px}
.alert-box .icon{font-size:32px}
.alert-box .title{color:var(--vc);font-weight:600;font-size:14px;margin-bottom:4px}
.alert-box .desc{color:rgba(255,255,255,0.7);font-size:13px;line-height:1.6}

@media(max-width:600px){
  .cards-grid{grid-template-columns:1fr}
  .hero{padding:32px 24px}
  .hero h1{font-size:22px}
  main{padding:16px 14px 40px}
  .nav-links{display:none}
  .nav-hamburger{display:block}
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="go('home')">Selvia</div>
  <div class="nav-links" id="navLinks"></div>
</nav>

<div class="breadcrumb" id="breadcrumb">
  <span class="link" onclick="go('home')">Guia Selvia</span>
  <span style="margin:0 8px">›</span>
  <span class="current" id="breadcrumbTitle"></span>
</div>

<main id="content"></main>

<footer>
  <div class="footer-logo">Selvia</div>
  <div class="footer-tag">Contabilidade simples, como deveria ser.</div>
</footer>

<script>
const sections=[
{id:"home",label:"Início"},
{id:"contabilidade",label:"Contabilidade Médica"},
{id:"financeiro",label:"Gestão Financeira"},
{id:"ir",label:"Imposto de Renda"},
{id:"reforma",label:"Reforma Tributária"},
{id:"plantonista",label:"Guia do Plantonista"}
];

const pages={
home:`
<div class="hero">
<div class="hero-label">Guia Selvia</div>
<h1>Tudo que o médico precisa saber sobre dinheiro, impostos e contabilidade</h1>
<p>Material de referência para médicos recém-formados, residentes e pós-graduandos. Consulte sempre que precisar.</p>
</div>
<div class="cards-grid">
<div class="nav-card" onclick="go('contabilidade')"><div class="num">01</div><div class="title">Contabilidade Médica</div><div class="desc">CNPJ, regime tributário, notas fiscais</div></div>
<div class="nav-card" onclick="go('financeiro')"><div class="num">02</div><div class="title">Gestão Financeira</div><div class="desc">Fluxo de caixa, pró-labore, lucros</div></div>
<div class="nav-card" onclick="go('ir')"><div class="num">03</div><div class="title">Imposto de Renda</div><div class="desc">IRPF, IRPJ, deduções, malha fina</div></div>
<div class="nav-card" onclick="go('reforma')"><div class="num">04</div><div class="title">Reforma Tributária</div><div class="desc">IVA 5.0, split payment, IBS e CBS</div></div>
<div class="nav-card" onclick="go('plantonista')"><div class="num">05</div><div class="title">Guia do Plantonista</div><div class="desc">PJ para plantão, múltiplos vínculos</div></div>
</div>
<div class="partner-bar">Parceria <strong>Selvia × Inspirali</strong> — material exclusivo para médicos de pós-graduação</div>
`,

contabilidade:`
<div class="sec-badge">Seção 01</div>
<div class="sec-title">Contabilidade Médica na Prática</div>
<div class="sec-sub">Do CRM ao CNPJ: tudo que você precisa para atuar como médico PJ de forma correta e pagar o mínimo de imposto legalmente.</div>
${topic("Abrindo seu CNPJ médico","green",[
["Passo a passo completo","Do registro no CRM até a emissão da primeira nota fiscal. Documentos necessários, prazos e custos envolvidos na abertura."],
["Tipo societário","SLU (Sociedade Limitada Unipessoal), Ltda, Sociedade Uniprofissional — qual escolher e o impacto na tributação. A SLU é a mais comum para médicos que atuam sozinhos."],
["CNAE correto","O CNAE (Classificação Nacional de Atividades Econômicas) define qual imposto você paga. O CNAE 8630-5/03 (atividade médica ambulatorial) é o mais usado. Um número errado pode impedir o acesso à alíquota reduzida da reforma tributária."],
["Endereço fiscal e alvará","Não precisa ter consultório para ter CNPJ. Existem serviços de endereço fiscal virtual. O alvará e a inscrição municipal são obrigatórios para emitir nota."]
])}
${topic("Regime tributário: qual escolher?","yellow",[
["Simples Nacional","Imposto unificado em guia única (DAS). Parece simples, mas pode ser caro: médicos caem no Anexo V (alíquota a partir de 15,5%) a menos que a folha de pagamento (incluindo pró-labore) represente 28%+ do faturamento (Fator R), o que leva ao Anexo III (a partir de 6%)."],
["Lucro Presumido","O mais usado por médicos PJ. A Receita presume que 32% do faturamento é lucro e tributa sobre isso. Carga total gira em torno de 13% a 16% do faturamento, dependendo do ISS do município."],
["Lucro Real","Tributa sobre o lucro efetivo. Raramente vantajoso para médicos, a não ser em clínicas com muitas despesas dedutíveis. Exige contabilidade mais rigorosa."],
["Simulação comparativa","Um médico que fatura R$ 25.000/mês pode pagar de R$ 1.500 (Presumido bem estruturado) a R$ 3.875 (Simples no Anexo V). A diferença é de quase R$ 30.000/ano — só por estar no regime errado."]
])}
${topic("Rotina contábil e obrigações","blue",[
["Nota fiscal","Toda vez que você presta serviço como PJ (plantão, consulta, procedimento), precisa emitir NFS-e. A maioria dos municípios tem sistema online. Não emitir nota é sonegação."],
["Guias de pagamento","DAS (Simples), DARF (IRPJ, CSLL, PIS, COFINS no Presumido), ISS. Cada regime tem suas guias e prazos. Atrasar gera multa + juros."],
["Obrigações acessórias","DEFIS (Simples), DIRF, ECD, ECF (Presumido/Real). São declarações que seu contador entrega. Você precisa saber que existem e cobrar que sejam feitas em dia."],
["Deduções legítimas","Aluguel do consultório, materiais, equipamentos, plano de saúde empresarial, telefone, internet, carro (se usado profissionalmente), cursos e congressos. Tudo com nota fiscal."]
])}
<div class="dl-card"><div class="info"><strong>Checklist do CNPJ Médico</strong><span>PDF com o passo a passo completo para abrir e configurar seu CNPJ</span></div><div class="btn">Em breve</div></div>
`,

financeiro:`
<div class="sec-badge">Seção 02</div>
<div class="sec-title">Gestão Financeira do Médico</div>
<div class="sec-sub">Fluxo de caixa, regime de caixa vs competência, pró-labore vs lucros — como organizar seu dinheiro desde o primeiro plantão.</div>
${topic("Fluxo de caixa na prática","green",[
["O que é fluxo de caixa","É o controle de tudo que entra e sai da sua conta PJ. Parece básico, mas a maioria dos médicos não faz. Sem isso, você não sabe se está lucrando ou só girando dinheiro."],
["Como montar o seu","Planilha simples: receitas (plantões, consultas, procedimentos) menos despesas (impostos, contador, aluguel, materiais). Faça toda semana. Em 3 meses você terá uma visão clara da sua saúde financeira."],
["Capital de giro","Dinheiro que precisa ficar no caixa da PJ para cobrir despesas fixas. Com o split payment da reforma, esse valor vai precisar ser maior — o imposto será retido antes de cair na conta."]
])}
${topic("Regime de caixa vs regime de competência","yellow",[
["Regime de caixa","O dinheiro 'conta' quando efetivamente entra na sua conta. Exemplo: você faz um plantão em março, mas o hospital paga em abril. No regime de caixa, a receita é de abril."],
["Regime de competência","O dinheiro 'conta' quando o serviço é prestado, independente de quando você recebe. Mesmo plantão: a receita é de março, mesmo que o pagamento caia só em abril."],
["Qual usar?","No Simples Nacional, pode escolher. No Lucro Presumido e Real, o padrão é competência. A escolha impacta quando você paga imposto — pode adiantar ou postergar pagamentos. Converse com seu contador."]
])}
${topic("Pró-labore vs distribuição de lucros","orange",[
["Pró-labore","É o 'salário' que o médico se paga como sócio. Tem incidência de INSS (11%) e IR na fonte (tabela progressiva até 27,5%). É obrigatório para quem trabalha na empresa."],
["Distribuição de lucros","É a parte do lucro da empresa que o sócio retira. Se a contabilidade estiver em dia, é isenta de IR e INSS. Por isso a maioria dos médicos prefere pró-labore baixo + distribuição alta."],
["O equilíbrio certo","Pró-labore muito baixo pode dar problema com o INSS e afetar sua aposentadoria. Pró-labore muito alto come seu lucro em impostos. No Simples, o pró-labore precisa ser no mínimo 28% do faturamento para cair no Anexo III (Fator R). Cada caso é um caso."],
["Erro fatal: misturar PF e PJ","Pagar conta pessoal com dinheiro da PJ, ou receber plantão na conta PF. Isso é o caminho mais rápido para problemas com a Receita. Separe as contas desde o dia 1."]
])}
${topic("Reserva para impostos","pink",[
["A regra dos 20%","Separe pelo menos 20% de todo faturamento bruto numa conta reserva para impostos. Quando a guia chegar, o dinheiro já está lá. Parece óbvio, mas a maioria dos médicos gasta tudo e depois corre atrás."],
["Com a reforma tributária","O split payment vai resolver parte disso automaticamente — o imposto é retido na fonte. Mas até 2033 os dois sistemas convivem, então a reserva manual ainda é necessária."]
])}
<div class="dl-card"><div class="info"><strong>Planilha de Fluxo de Caixa</strong><span>Modelo pronto para controlar receitas e despesas da sua PJ médica</span></div><div class="btn">Em breve</div></div>
`,

ir:`
<div class="sec-badge">Seção 03</div>
<div class="sec-title">Imposto de Renda para Médicos</div>
<div class="sec-sub">IRPF, IRPJ, carnê-leão, deduções e os erros que levam à malha fina. Tudo que você precisa saber para declarar certo.</div>
${topic("IRPF — Pessoa Física","green",[
["Quando o médico declara como PF","Mesmo atuando como PJ, o médico declara IRPF anualmente. Na declaração entram: pró-labore recebido da PJ, distribuição de lucros (isenta), rendimentos de aplicações financeiras, aluguéis, e qualquer rendimento como pessoa física."],
["Carnê-Leão","Se você atende pacientes particulares como PF (sem CNPJ), precisa recolher imposto mensalmente via carnê-leão. A alíquota vai de 0% a 27,5% dependendo do valor. Muitos médicos esquecem e só descobrem na hora de declarar — com multa."],
["Livro-caixa","Para médicos que atuam como autônomos (sem PJ), o livro-caixa permite deduzir despesas profissionais: aluguel do consultório, materiais, funcionários, água, luz, telefone. Reduz a base de cálculo do carnê-leão."],
["Deduções permitidas no IRPF","Dependentes (R$ 2.275,08/ano cada), despesas médicas (sem limite), educação (limite anual), previdência oficial (INSS), previdência privada PGBL (até 12% da renda bruta). Cada dedução reduz quanto você paga."]
])}
${topic("IRPJ — Pessoa Jurídica","yellow",[
["No Simples Nacional","O IRPJ já está incluído na guia do DAS. Não precisa calcular separado. A alíquota depende do anexo e da faixa de faturamento."],
["No Lucro Presumido","A Receita presume que 32% do faturamento é lucro. Sobre esses 32%, aplica 15% de IRPJ + 10% de adicional (sobre o que exceder R$ 20.000/mês de lucro presumido) + 9% de CSLL. Na prática, o IRPJ + CSLL somam ~11,33% do faturamento."],
["Distribuição de lucros isenta","O lucro que sobra depois de pagar todos os tributos pode ser distribuído ao sócio sem IR e sem INSS, desde que a contabilidade esteja escriturada corretamente. Se não estiver, a Receita pode tributar tudo como rendimento."]
])}
${topic("Erros que levam à malha fina","red",[
["Não declarar rendimentos da PJ","O pró-labore que você recebe da sua PJ é rendimento tributável. Muitos médicos esquecem de incluir ou declaram valor errado. A Receita cruza com a DIRF da empresa."],
["Despesas médicas infladas","Despesas médicas não têm limite de dedução, mas são o item mais fiscalizado. Recibo sem nota, valor inconsistente ou CPF errado = malha fina."],
["Omitir rendimentos de plantão","Se você fez plantão como PF e não recolheu carnê-leão, a Receita descobre pelo cruzamento com a RAIS/eSocial do hospital."],
["Distribuição de lucros sem lastro contábil","Distribuir lucro acima do que a contabilidade apura como lucro da empresa. Sem balanço, a Receita pode considerar tudo como pró-labore e cobrar IR + INSS retroativo."]
])}
<div class="dl-card"><div class="info"><strong>Guia do IR do Médico</strong><span>PDF com todas as regras, deduções e prazos para a declaração anual</span></div><div class="btn">Em breve</div></div>
`,

reforma:`
<div class="sec-badge">Seção 04</div>
<div class="sec-title">Reforma Tributária</div>
<div class="sec-sub">IVA 5.0, IBS, CBS, split payment, alíquota reduzida — tradução prática de tudo que muda para o médico PJ entre 2026 e 2033.</div>
<div class="alert-box"><div class="icon">⚠</div><div><div class="title">Atenção: a transição já começou</div><div class="desc">Em 2026, CBS (0,9%) e IBS (0,1%) já aparecem nas notas fiscais com alíquotas simbólicas. O impacto real começa em 2027 e a transição vai até 2033.</div></div></div>
${topic("O que é o IVA 5.0","green",[
["De 5 impostos para 2","PIS, COFINS, ICMS, ISS e IPI deixam de existir. No lugar, entram CBS (federal) e IBS (estadual/municipal). Juntos, formam o IVA 5.0 — um imposto sobre valor agregado no padrão internacional."],
["Base legal","Emenda Constitucional 132/2023 + Lei Complementar 214/2025. O setor de saúde está no Anexo X da LC 214/2025, com direito a redução de 60% na alíquota."],
["Na prática para o médico","Se a alíquota padrão for ~28%, clínicas e consultórios médicos pagam ~11% de IBS+CBS. Parece menor que os 13-16% atuais do Presumido, mas a conta não é tão simples porque mudou a lógica de cálculo."]
])}
${topic("Split payment: o imposto retido na fonte","orange",[
["O que é","Consórcio nacional para pagamento automático de imposto. Quando o hospital paga seu plantão, o sistema separa o imposto e manda direto pro governo. Você recebe o valor líquido — sem o imposto no caixa."],
["Impacto no caixa do médico","Hoje o imposto fica no seu caixa até o vencimento da guia (você 'gira' esse dinheiro). Com o split payment, ele sai na hora. Isso exige capital de giro maior e planejamento financeiro mais rigoroso."],
["Crédito financeiro","O IVA 5.0 gera créditos tributários automáticos. Se você compra insumos, equipamentos ou contrata serviços com nota fiscal, gera crédito que abate o imposto a pagar. Mas se o CNPJ não estiver bem configurado (CNAE, regime, notas), você não aproveita o crédito."],
["Quem se beneficia","Clínicas com despesas operacionais relevantes (aluguel, equipamentos, funcionários) geram mais crédito e pagam menos. Médicos PJ que só atendem sem custos relevantes pagam a alíquota cheia — e podem pagar mais que hoje."]
])}
${topic("Fim do ISS fixo e impacto em sociedades médicas","yellow",[
["ISS fixo vai acabar","Hoje, sociedades uniprofissionais pagam ISS fixo por profissional (valor baixo). Com a reforma, o ISS vira IBS, que é calculado sobre o faturamento total. Para clínicas pequenas, o impacto pode ser grande."],
["Simples Nacional: por dentro vs por fora","Médico no Simples pode escolher: pagar CBS/IBS dentro do DAS (mais simples, mas não transfere crédito ao hospital contratante) ou por fora (mais complexo, mas o hospital pode aproveitar o crédito e prefere te contratar)."]
])}
${topic("Cronograma da transição","blue",[
["2026","Fase de teste. CBS 0,9% + IBS 0,1% aparecem nas notas fiscais, mas sem impacto financeiro real. O objetivo é testar o sistema."],
["2027 a 2032","Convivência dos dois modelos. Os impostos antigos (ISS, PIS, COFINS) diminuem gradualmente enquanto IBS e CBS aumentam. É o período mais complexo — dois sistemas rodando ao mesmo tempo."],
["2033 em diante","Sistema novo completo. ISS, PIS, COFINS, ICMS e IPI deixam de existir definitivamente. Split payment funcionando para todos."],
["O que fazer agora","Revisar regime tributário, conferir CNAE, simular impacto da reforma no seu faturamento, organizar fluxo de caixa e garantir que sua contabilidade está preparada para a transição."]
])}
<div class="dl-card"><div class="info"><strong>Simulador de Impacto da Reforma</strong><span>Planilha para comparar sua carga tributária atual vs projetada com IBS/CBS</span></div><div class="btn">Em breve</div></div>
`,

plantonista:`
<div class="sec-badge">Seção 05</div>
<div class="sec-title">Guia do Plantonista</div>
<div class="sec-sub">Tudo que o médico que vive de plantão precisa saber sobre PJ, notas fiscais, múltiplos vínculos e o impacto da reforma no seu bolso.</div>
${topic("PJ para plantão: o básico","green",[
["Por que ser PJ para dar plantão","A maioria dos hospitais privados prefere contratar plantonistas como PJ. O médico PJ pode receber até 30% mais líquido que um CLT, dependendo do regime tributário. Mas é preciso estruturar corretamente."],
["Como emitir nota para hospitais","Após cada plantão (ou mensalmente, conforme contrato), você emite uma NFS-e pelo sistema da prefeitura do município onde está inscrito. O hospital paga mediante nota. Sem nota = sem pagamento."],
["Múltiplos vínculos","Médico que dá plantão em 3 hospitais + atende consultório emite nota de cada um. Tudo pelo mesmo CNPJ. O faturamento total determina sua faixa de tributação no Simples ou o volume de impostos no Presumido."]
])}
${topic("Simulações: quanto sobra no bolso","yellow",[
["Plantonista faturando R$ 25.000/mês","No Lucro Presumido: ~R$ 3.500 de impostos → sobra ~R$ 21.500. No Simples (Anexo V): ~R$ 3.875 → sobra ~R$ 21.125. No Simples (Anexo III, com Fator R): ~R$ 1.800 → sobra ~R$ 23.200. A diferença entre o pior e o melhor cenário é de R$ 25.000/ano."],
["Plantonista faturando R$ 40.000/mês","No Lucro Presumido: ~R$ 5.800 de impostos. No Simples (Anexo V): ~R$ 6.800. A diferença aumenta conforme o faturamento sobe. A partir de R$ 30.000/mês, o Presumido quase sempre ganha."],
["Com a reforma tributária","No novo modelo, o plantonista PJ que não tem despesas operacionais relevantes tende a pagar mais, porque não gera créditos tributários. Quem tem consultório com custos (aluguel, equipamentos) pode pagar menos. Simular agora é fundamental."]
])}
${topic("Erros fatais do plantonista PJ","red",[
["Receber plantão na conta PF","Se o hospital deposita na sua conta pessoal em vez da conta PJ, a Receita considera rendimento de pessoa física — e tributa a até 27,5% + INSS. Sempre receba via CNPJ."],
["Não emitir nota","Hospital pagou, você não emitiu nota. É sonegação. Além do risco fiscal, perde o crédito tributário que poderia gerar na reforma."],
["CNAE errado","Se seu CNAE não corresponde a atividade médica, você pode não ter acesso à alíquota reduzida de 60% da reforma. Verifique se está com 8630-5/03 ou equivalente."],
["Não separar reserva de impostos","Gastar tudo que entra e não ter dinheiro quando a guia chega. Reserve 20% de cada plantão automaticamente."]
])}
<div class="dl-card"><div class="info"><strong>Checklist do Plantonista PJ</strong><span>PDF com tudo que você precisa verificar antes de cada plantão como PJ</span></div><div class="btn">Em breve</div></div>
`
};

function topic(title,accent,items){
  let html=`<div class="topic" data-accent="${accent}" onclick="this.classList.toggle('open')">
  <div class="topic-header"><span>${title}</span><span class="topic-arrow">▾</span></div>
  <div class="topic-body">`;
  items.forEach(([t,d])=>{html+=`<div class="topic-item"><strong>${t}</strong><p>${d}</p></div>`});
  html+=`</div></div>`;
  return html;
}

let currentPage="home";

function go(id){
  currentPage=id;
  document.getElementById("content").innerHTML=pages[id];
  const bc=document.getElementById("breadcrumb");
  const bt=document.getElementById("breadcrumbTitle");
  if(id==="home"){bc.classList.remove("show")}
  else{bc.classList.add("show");bt.textContent=sections.find(s=>s.id===id).label}
  renderNav();
  window.scrollTo(0,0);
}

function renderNav(){
  const nl=document.getElementById("navLinks");
  nl.innerHTML=sections.slice(1).map(s=>
    `<button class="nav-btn ${currentPage===s.id?'active':''}" onclick="go('${s.id}')">${s.label}</button>`
  ).join("");
}

go("home");
</script>
