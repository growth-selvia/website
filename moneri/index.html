<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="refresh" content="3;url=https://wa.me/5511936220451?text=Ol%C3%A1%2C%20finalizei%20o%20curso%20de%20contabilidade%20da%20Selvia%20e%20quero%20resgatar%20meu%20benef%C3%ADcio%20de%201%20m%C3%AAs%20gratuito%20de%20contabilidade">
  <title>Moneri × Selvia — Resgate seu benefício</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,500;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --moneri-dark: #1a1a2e;
      --moneri-purple: #6c3ce0;
      --moneri-light-purple: #a78bfa;
      --selvia-green: #00c896;
      --selvia-light: #e0fff5;
      --white: #ffffff;
      --gray-100: #f4f4f8;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--moneri-dark);
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: absolute;
      top: -40%;
      left: -20%;
      width: 80vw;
      height: 80vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(108,60,224,0.15) 0%, transparent 70%);
      animation: pulse-bg 6s ease-in-out infinite;
    }

    body::after {
      content: '';
      position: absolute;
      bottom: -30%;
      right: -15%;
      width: 60vw;
      height: 60vw;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(0,200,150,0.1) 0%, transparent 70%);
      animation: pulse-bg 8s ease-in-out infinite reverse;
    }

    @keyframes pulse-bg {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.1); opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 10;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 440px;
      width: 90%;
      text-align: center;
      animation: card-in 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px);
    }

    @keyframes card-in {
      to { opacity: 1; transform: translateY(0); }
    }

    .logos {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 32px;
      animation: fade-in 1s 0.3s ease forwards;
      opacity: 0;
    }

    @keyframes fade-in {
      to { opacity: 1; }
    }

    .logo-moneri {
      font-size: 22px;
      font-weight: 700;
      color: var(--moneri-light-purple);
      letter-spacing: -0.5px;
    }

    .logo-x {
      font-size: 14px;
      color: rgba(255,255,255,0.3);
      font-weight: 300;
    }

    .logo-selvia {
      font-size: 22px;
      font-weight: 700;
      color: var(--selvia-green);
      letter-spacing: -0.5px;
    }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--selvia-green), #00a87d);
      color: var(--moneri-dark);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 6px 16px;
      border-radius: 100px;
      margin-bottom: 24px;
      animation: fade-in 1s 0.5s ease forwards;
      opacity: 0;
    }

    h1 {
      color: var(--white);
      font-size: 24px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
      animation: fade-in 1s 0.6s ease forwards;
      opacity: 0;
    }

    .subtitle {
      color: rgba(255,255,255,0.5);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 32px;
      animation: fade-in 1s 0.7s ease forwards;
      opacity: 0;
    }

    .whatsapp-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #25D366;
      color: white;
      text-decoration: none;
      font-size: 16px;
      font-weight: 600;
      padding: 16px 32px;
      border-radius: 16px;
      transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      animation: fade-in 1s 0.9s ease forwards;
      opacity: 0;
      box-shadow: 0 4px 24px rgba(37, 211, 102, 0.3);
    }

    .whatsapp-btn:hover {
      transform: translateY(-2px) scale(1.02);
      box-shadow: 0 8px 32px rgba(37, 211, 102, 0.45);
    }

    .whatsapp-btn svg {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
    }

    .redirect-note {
      margin-top: 24px;
      color: rgba(255,255,255,0.25);
      font-size: 12px;
      animation: fade-in 1s 1.1s ease forwards;
      opacity: 0;
    }

    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid rgba(255,255,255,0.15);
      border-top-color: rgba(255,255,255,0.4);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 480px) {
      .card { padding: 36px 24px; }
      h1 { font-size: 20px; }
      .whatsapp-btn { padding: 14px 24px; font-size: 15px; }
    }
  </style>
</head>
<body>

      <span class="logo-moneri">Moneri</span>
      <span class="logo-x">×</span>

    <div class="badge">Curso concluído</div>

    <h1>Parabéns por finalizar o curso!</h1>
    <p class="subtitle">Resgate agora seu benefício exclusivo de <strong style="color: var(--selvia-green);">1 mês gratuito</strong> de contabilidade com a Selvia.</p>

  </div>
</body>
</html>
